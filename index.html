<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <title>Plataforma Estadual de Sustentabilidade</title>
  <meta name="description" content="Protótipo funcional da Plataforma Estadual de Sustentabilidade em Contratações Públicas.">
  <style>
    :root { --green:#087a3e; --dark:#062a20; --line:#dce6df; }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; background:#f2f4f3; }
    body { margin:0; min-width:320px; font-family:Arial,Helvetica,sans-serif; color:#151719; }
    button,input { font:inherit; }
    .prototype {
      position:relative;
      width:min(100%,1024px);
      aspect-ratio:2/3;
      margin:0 auto;
      overflow:hidden;
      background:#fff;
      box-shadow:0 0 45px rgb(0 0 0 / .08);
    }
    .visual { position:absolute; inset:0; width:100%; height:100%; display:block; user-select:none; }
    .hotspot { position:absolute; z-index:2; border:0; padding:0; background:transparent; color:transparent; cursor:pointer; border-radius:8px; }
    .hotspot:hover { background:rgb(8 122 62 / .045); box-shadow:inset 0 0 0 1px rgb(8 122 62 / .15); }
    .hotspot:focus-visible { outline:3px solid #18a85b; outline-offset:2px; }
    .nav { top:1.5%; height:3.4%; }
    .nav-home{left:24.7%;width:5.7%}.nav-indicators{left:29.9%;width:8.1%}.nav-contracts{left:37.9%;width:8.8%}
    .nav-library{left:46.7%;width:7.3%}.nav-reports{left:53.8%;width:7.2%}.nav-transparency{left:61.1%;width:8.8%}
    .top-search { position:absolute; z-index:3; left:72.1%; top:1.65%; width:15.2%; height:2.35%; border:0; outline:0; padding:0 1.1%; border-radius:7px; color:#4c5156; font-size:clamp(5px,1vw,10px); background:transparent; }
    .top-search:focus,.top-search:not(:placeholder-shown) { background:#fff; box-shadow:0 0 0 1px #d9dfdc; }
    .notify{left:87.5%;top:1.7%;width:2.6%;height:2.4%}.accessibility{left:90.1%;top:1.7%;width:2.6%;height:2.4%}.profile{left:92.8%;top:1.7%;width:6%;height:2.4%}
    .hero-primary{left:5.5%;top:24.7%;width:15.4%;height:2.75%}.hero-secondary{left:22.1%;top:24.7%;width:18.8%;height:2.75%}
    .main-search { position:absolute; z-index:3; left:7.8%; top:29.83%; width:75%; height:2.75%; border:0; outline:0; padding:0 1%; color:#56606e; font-size:clamp(6px,1.15vw,12px); background:transparent; }
    .main-search:focus,.main-search:not(:placeholder-shown) { background:#fff; }
    .filter{left:86.05%;top:29.72%;width:8.6%;height:2.45%}
    .quick{top:36.1%;height:15.9%}.quick-1{left:5.9%;width:16.3%}.quick-2{left:23.3%;width:16.4%}.quick-3{left:41%;width:16.5%}.quick-4{left:58.7%;width:16.4%}.quick-5{left:76.4%;width:17.8%}
    .ods-more{left:67%;top:54.1%;width:26.8%;height:2.1%}.ods-grid{left:5.3%;top:56.7%;width:88.9%;height:5.5%}
    .highlights-more{left:88.1%;top:64.1%;width:6.5%;height:2%}
    .criteria{left:5.7%;top:66.35%;width:28.7%;height:14.7%}.documents{left:36.7%;top:66.35%;width:28.4%;height:14.7%}.faq{left:67%;top:66.35%;width:28.4%;height:14.7%}
    .cta{left:68.7%;top:83.7%;width:22.7%;height:2.8%}
    .footer-platform{left:24.5%;top:88.6%;width:10%;height:8.6%}.footer-resources{left:37.8%;top:88.6%;width:16%;height:8.6%}.footer-support{left:54.6%;top:88.6%;width:10.8%;height:8.6%}.footer-gov{left:68.6%;top:88.6%;width:18%;height:7.3%}
    .toast { position:fixed; z-index:20; left:50%; bottom:22px; translate:-50% 14px; max-width:min(92vw,540px); padding:13px 18px; border-radius:11px; background:var(--dark); color:#fff; font-weight:700; font-size:13px; box-shadow:0 14px 45px rgb(0 0 0 / .25); opacity:0; pointer-events:none; transition:.22s ease; }
    .toast.show { opacity:1; translate:-50% 0; }
    .dialog-backdrop { position:fixed; z-index:30; inset:0; display:none; place-items:center; padding:20px; background:rgb(2 28 20 / .48); backdrop-filter:blur(3px); }
    .dialog-backdrop.open { display:grid; }
    .dialog { width:min(100%,470px); max-height:85vh; overflow:auto; padding:24px; border-radius:18px; background:#fff; box-shadow:0 28px 80px rgb(0 0 0 / .25); }
    .dialog-head { display:flex; align-items:center; justify-content:space-between; gap:15px; margin-bottom:16px; }
    .dialog h2 { margin:0; font-size:20px; }.dialog p { color:#50585a; font-size:14px; line-height:1.6; }
    .close { width:34px; height:34px; border:0; border-radius:50%; background:#eff7f2; color:var(--green); cursor:pointer; font-size:20px; }
    .filter-list { display:grid; gap:9px; }.filter-list label { display:flex; align-items:center; gap:10px; padding:11px; border:1px solid var(--line); border-radius:10px; font-size:14px; cursor:pointer; }
    .dialog-action { width:100%; margin-top:16px; padding:12px; border:0; border-radius:9px; background:var(--green); color:#fff; font-weight:700; cursor:pointer; }
    .results { display:grid; gap:10px; }.result { padding:12px; border:1px solid var(--line); border-radius:10px; }.result strong { display:block; color:var(--green); }.result small { color:#66706b; }
    @media (max-width:700px) {
      body { background:#fff; }
      .prototype { box-shadow:none; }
      .hotspot:hover { background:transparent; box-shadow:none; }
      .toast { font-size:12px; }
    }
    @media (prefers-reduced-motion:reduce) { html{scroll-behavior:auto}.toast{transition:none} }
  </style>
</head>
<body>
  <main class="prototype" id="inicio" aria-label="Plataforma Estadual de Sustentabilidade">
    <img class="visual" src="assets/reference-portal.jpg" width="1024" height="1536" alt="Portal de Sustentabilidade em Contratações Públicas do Governo do Estado de São Paulo">

    <button class="hotspot nav nav-home" data-scroll="inicio" aria-label="Início"></button>
    <button class="hotspot nav nav-indicators" data-action="Indicadores" aria-label="Indicadores"></button>
    <button class="hotspot nav nav-contracts" data-action="Contratações" aria-label="Contratações"></button>
    <button class="hotspot nav nav-library" data-action="Biblioteca" aria-label="Biblioteca"></button>
    <button class="hotspot nav nav-reports" data-action="Relatórios" aria-label="Relatórios"></button>
    <button class="hotspot nav nav-transparency" data-action="Transparência" aria-label="Transparência"></button>
    <input class="top-search" id="top-search" aria-label="Buscar na plataforma" placeholder="">
    <button class="hotspot notify" data-action="Você tem 2 notificações" aria-label="Notificações"></button>
    <button class="hotspot accessibility" data-action="Recursos de acessibilidade" aria-label="Acessibilidade"></button>
    <button class="hotspot profile" data-action="Perfil do gestor" aria-label="Abrir perfil"></button>

    <button class="hotspot hero-primary" data-scroll="criteria" aria-label="Explorar critérios"></button>
    <button class="hotspot hero-secondary" data-dialog="about" aria-label="Conhecer a plataforma"></button>
    <input class="main-search" id="main-search" aria-label="Pesquisar critérios, termos, ODS e documentos" placeholder="">
    <button class="hotspot filter" data-dialog="filters" aria-label="Abrir filtros"></button>

    <button class="hotspot quick quick-1" data-action="Abrindo a Biblioteca" aria-label="Acessar biblioteca"></button>
    <button class="hotspot quick quick-2" data-action="Produtos com Selo Verde estarão disponíveis em breve" aria-label="Produtos com Selo Verde"></button>
    <button class="hotspot quick quick-3" data-dialog="ods" aria-label="Conhecer os ODS"></button>
    <button class="hotspot quick quick-4" data-action="Abrindo o Glossário de Sustentabilidade" aria-label="Acessar glossário"></button>
    <a class="hotspot quick quick-5" href="https://online.fliphtml5.com/kpxxz/qqct/#p=1" target="_blank" rel="noreferrer" aria-label="Acessar A Lei de Licitações e os ODS"></a>
    <button class="hotspot ods-more" data-dialog="ods" aria-label="Conheça os 17 Objetivos da Agenda 2030"></button>
    <button class="hotspot ods-grid" data-dialog="ods" aria-label="Objetivos de Desenvolvimento Sustentável"></button>
    <button class="hotspot highlights-more" data-action="Todos os conteúdos em destaque" aria-label="Ver todos os conteúdos"></button>
    <button class="hotspot criteria" id="criteria" data-dialog="criteria" aria-label="Ver critérios em destaque"></button>
    <button class="hotspot documents" data-dialog="documents" aria-label="Ver biblioteca em destaque"></button>
    <button class="hotspot faq" data-dialog="faq" aria-label="Abrir perguntas frequentes"></button>
    <button class="hotspot cta" data-dialog="about" aria-label="Saiba mais sobre a plataforma"></button>
    <button class="hotspot footer-platform" data-action="Links da plataforma" aria-label="Links da plataforma"></button>
    <button class="hotspot footer-resources" data-action="Recursos da plataforma" aria-label="Recursos"></button>
    <button class="hotspot footer-support" data-dialog="faq" aria-label="Suporte"></button>
    <button class="hotspot footer-gov" data-action="Governo do Estado de São Paulo" aria-label="Governo do Estado de São Paulo"></button>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="dialog-backdrop" id="dialog-backdrop" role="presentation">
    <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
      <div class="dialog-head"><h2 id="dialog-title"></h2><button class="close" id="dialog-close" aria-label="Fechar">×</button></div>
      <div id="dialog-content"></div>
    </section>
  </div>

  <script>
    const toast = document.querySelector('#toast');
    const backdrop = document.querySelector('#dialog-backdrop');
    const title = document.querySelector('#dialog-title');
    const content = document.querySelector('#dialog-content');
    const dialogs = {
      about: ['Sobre a plataforma','<p>A Plataforma Estadual apoia gestores na aplicação de critérios sustentáveis em contratações públicas, conectando conhecimento, indicadores, ODS e documentos técnicos.</p><button class="dialog-action" data-close>Entendi</button>'],
      filters: ['Filtrar conteúdos','<div class="filter-list"><label><input type="checkbox" value="criterios"> Critérios de sustentabilidade</label><label><input type="checkbox" value="biblioteca"> Biblioteca</label><label><input type="checkbox" value="ods"> Objetivos de Desenvolvimento Sustentável</label><label><input type="checkbox" value="glossario"> Glossário</label></div><button class="dialog-action" id="apply-filters">Aplicar filtros</button>'],
      ods: ['Objetivos de Desenvolvimento Sustentável','<p>Os 17 ODS formam a Agenda 2030 da ONU e orientam ações para erradicar a pobreza, proteger o planeta e promover prosperidade.</p><div class="results"><div class="result"><strong>ODS nas contratações</strong><small>Relacione cada critério ao impacto sustentável correspondente.</small></div></div>'],
      criteria: ['Critérios em destaque','<div class="results"><div class="result"><strong>CRIT-SP 001</strong><small>Acessibilidade em edificações</small></div><div class="result"><strong>CRIT-SP 014</strong><small>Sistema fotovoltaico</small></div><div class="result"><strong>CRIT-SP 028</strong><small>Logística reversa de produtos</small></div></div>'],
      documents: ['Biblioteca em destaque','<div class="results"><div class="result"><strong>Guia de Compras Sustentáveis</strong><small>PDF · 2,4 MB · Download demonstrativo</small></div><div class="result"><strong>Manual de Aplicação dos Critérios</strong><small>PDF · 3,1 MB · Download demonstrativo</small></div><div class="result"><strong>Cartilha Agenda 2030</strong><small>PDF · 1,8 MB · Download demonstrativo</small></div></div>'],
      faq: ['Perguntas frequentes','<div class="results"><div class="result"><strong>Como utilizar os critérios?</strong><small>Selecione o critério adequado ao objeto e inclua suas exigências no documento da contratação.</small></div><div class="result"><strong>Os critérios são obrigatórios?</strong><small>A aplicação depende da legislação, do objeto e da justificativa técnica de cada contratação.</small></div><div class="result"><strong>Como relacionar critérios aos ODS?</strong><small>Cada critério pode indicar os ODS diretamente associados ao impacto esperado.</small></div></div>']
    };
    function showToast(message) { toast.textContent=message; toast.classList.add('show'); clearTimeout(showToast.timer); showToast.timer=setTimeout(()=>toast.classList.remove('show'),2300); }
    function openDialog(key) { const data=dialogs[key]; if(!data)return; title.textContent=data[0]; content.innerHTML=data[1]; backdrop.classList.add('open'); document.querySelector('#dialog-close').focus(); }
    function closeDialog() { backdrop.classList.remove('open'); }
    document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',()=>showToast(el.dataset.action)));
    document.querySelectorAll('[data-dialog]').forEach(el=>el.addEventListener('click',()=>openDialog(el.dataset.dialog)));
    document.querySelectorAll('[data-scroll]').forEach(el=>el.addEventListener('click',()=>document.querySelector('#'+el.dataset.scroll)?.scrollIntoView({behavior:'smooth'})));
    document.querySelector('#dialog-close').addEventListener('click',closeDialog);
    backdrop.addEventListener('click',e=>{if(e.target===backdrop||e.target.closest('[data-close]'))closeDialog(); if(e.target.id==='apply-filters'){closeDialog();showToast('Filtros aplicados ao protótipo');}});
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDialog();});
    [document.querySelector('#top-search'),document.querySelector('#main-search')].forEach(input=>input.addEventListener('keydown',e=>{if(e.key==='Enter'){const q=input.value.trim(); if(!q){showToast('Digite um termo para pesquisar');return;} openDialog('criteria'); title.textContent='Resultados para “'+q+'”'; input.blur();}}));
  </script>
</body>
</html>
